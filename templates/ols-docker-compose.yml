version: "3.8"
# OpenLiteSpeed — shared WordPress web server with LSCache
# One instance serves all WP vhosts. Maps host 8088 → container 80.
services:
  litespeed:
    image: litespeedtech/openlitespeed:${OLS_VERSION:-1.8.5}-${PHP_VERSION:-lsphp85}
    container_name: ${OLS_CONTAINER:-litespeed}
    env_file:
      - .env
    volumes:
      - ./lsws/conf:/usr/local/lsws/conf
      - ./lsws/admin-conf:/usr/local/lsws/admin/conf
      - ./bin/container:/usr/local/bin
      - ./sites:/var/www/vhosts/
      - ./acme:/root/.acme.sh/
      - ./logs:/usr/local/lsws/logs/
    ports:
      - "127.0.0.1:8088:80"
      - "127.0.0.1:7080:7080"
    restart: always
    environment:
      TZ: UTC
    networks:
      - wp-tier
      - default

networks:
  wp-tier:
    external: true
    name: ${WP_NETWORK:-wp-tier}
  default:
    driver: bridge
