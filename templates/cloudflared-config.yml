# Cloudflared tunnel config — generated by bootstrap.sh
# The TUNNEL_ID and credentials-file path are substituted at install time.
tunnel: __TUNNEL_ID__
credentials-file: /etc/cloudflared/credentials.json
protocol: http2

ingress:
  # Catch-all: every hostname CNAME'd to this tunnel → host Nginx :80.
  # Per-app routing is done by Dokku's virtual-host config, not here.
  - service: http://localhost:80
